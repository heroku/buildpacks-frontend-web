name: Update Caddy Inventory
on:
  workflow_dispatch:
  schedule:
    # Mondays at 08:00 UTC. Caddy releases roughly every 1-3 months,
    # so weekly is plenty.
    - cron: '0 8 * * 1'

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  update-caddy-inventory:
    name: Update Caddy inventory
    runs-on: pub-hk-ubuntu-24.04-ip
    steps:
      - uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          app-id: ${{ vars.LINGUIST_GH_APP_ID }}
          private-key: ${{ secrets.LINGUIST_GH_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Refresh Caddy inventory
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: ./.github/scripts/update-caddy-inventory.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          title: "Update Caddy web server version"
          commit-message: "Update Caddy web server version"
          committer: ${{ vars.LINGUIST_GH_APP_USERNAME }} <${{ vars.LINGUIST_GH_APP_EMAIL }}>
          author: ${{ vars.LINGUIST_GH_APP_USERNAME }} <${{ vars.LINGUIST_GH_APP_EMAIL }}>
          branch: update-caddy-inventory
          body: |
            Automated pull request to bump Caddy in `buildpacks/static-web-server/inventory.toml`.
